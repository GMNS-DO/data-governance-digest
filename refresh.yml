name: Refresh Data Governance Digest

on:
  # Daily at 6:00 AM UTC (news refresh)
  schedule:
    - cron: '0 6 * * *'
  # Also allow manual runs from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch articles and generate articles.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_articles.py

      - name: Commit and push articles.json
        run: |
          git config --global user.name  "Digest Bot"
          git config --global user.email "digest-bot@users.noreply.github.com"
          git fetch origin
          git add articles.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: refresh digest $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

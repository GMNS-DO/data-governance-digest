name: Refresh Data Governance Digest
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch articles and generate articles.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_articles.py
      - name: Commit and push articles.json
        run: |
          git config --global user.name "Digest Bot"
          git config --global user.email "bot@example.com"
          git fetch origin
          git add articles.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "refresh digest"
          git pull --rebase origin main
          git push
